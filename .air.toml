# Air — live reload for Go during development.
# Install: go install github.com/air-verse/air@latest
# Run:     air   (or `make watch`)
# Rebuilds and restarts ./cmd/server whenever a .go or .sql file changes.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  bin = "./tmp/server.exe"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "bin", "web", ".git", ".github"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
