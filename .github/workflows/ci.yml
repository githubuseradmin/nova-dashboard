name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nova -d nova"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...
      - name: go test
        env:
          NOVA_TEST_DATABASE_URL: postgres://nova:nova@localhost:5432/nova?sslmode=disable
        run: go test -race ./...

  frontend:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/app/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
